<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ReliCheck Basic">
  <defs>
    <!-- Neutral teal / blue-green app gradient -->
    <linearGradient id="rbBg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.55" stop-color="#0EA5A4"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <!-- Glossy top highlight -->
    <linearGradient id="rbGloss" x1="0" y1="40" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rbGlow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="rbShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0E7490" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Squircle body -->
  <rect x="40" y="40" width="432" height="432" rx="108" ry="108" fill="url(#rbBg)" filter="url(#rbShadow)"/>
  <rect x="40" y="40" width="432" height="432" rx="108" ry="108" fill="url(#rbGlow)"/>
  <!-- Gloss sweep over the top third -->
  <path d="M148 40h216c59.6 0 108 48.4 108 108v92c-104 36-312 36-432 0v-92C40 88.4 88.4 40 148 40z" fill="url(#rbGloss)"/>

  <!-- RB monogram -->
  <text x="256" y="312" text-anchor="middle" font-family="Inter, -apple-system, 'SF Pro Display', Helvetica, Arial, sans-serif"
        font-size="208" font-weight="800" letter-spacing="-6" fill="#ffffff">RB</text>

  <!-- subtle inner stroke for definition -->
  <rect x="41.5" y="41.5" width="429" height="429" rx="106.5" ry="106.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>
</svg>
