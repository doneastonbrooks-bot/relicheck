<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" width="440" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A90FF"/>
      <stop offset="100%" stop-color="#0050CC"/>
    </linearGradient>
  </defs>

  <!-- Clip path scoped to icon mark bounds at scaled position -->
  <clipPath id="icon-bounds">
    <rect x="10" y="10" width="80" height="80" rx="17.6"/>
  </clipPath>

  <!-- Icon mark (scaled to 80×80, centered in 100px tall strip) -->
  <g transform="translate(10, 10) scale(0.4)">
    <rect width="200" height="200" rx="44" fill="url(#bg)"/>
    <!-- Orange wave clipped to icon -->
    <g clip-path="url(#icon-bounds)" transform="translate(-25, -25) scale(2.5)">
      <path d="m4.75,54.75h18l8-36,10,72,8-36,9,24,11-46,14,52L128.75,4.75"
            transform="translate(6.5, 63.4) scale(1.4)"
            fill="none" stroke="#e8573a" stroke-linecap="round" stroke-linejoin="round" stroke-width="7"/>
    </g>
    <rect x="49"  y="120" width="18" height="28" rx="5" fill="white"/>
    <rect x="77"  y="98"  width="18" height="50" rx="5" fill="white"/>
    <rect x="105" y="76"  width="18" height="72" rx="5" fill="white"/>
    <rect x="133" y="54"  width="18" height="94" rx="5" fill="white"/>
  </g>

  <!-- RSSI wordmark -->
  <text x="104" y="54"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="800" letter-spacing="-1"
        fill="#007AFF">RSSI</text>

  <!-- Full name -->
  <text x="106" y="74"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif"
        font-size="13.5" font-weight="500" letter-spacing="0.01em"
        fill="#5f6368">ReliCheck Survey Strength Index</text>
</svg>
